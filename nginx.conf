# =============================================================================
# nginx.conf — NGINX Load Balancer Configuration
# =============================================================================
# What this file does:
#   Configures NGINX as a reverse proxy and load balancer in front of the two
#   API instances. Requests hit NGINX on port 80, which forwards them to the
#   API containers using round-robin (NGINX's default algorithm).
#
# Key decisions:
#   - Round-robin load balancing: each request goes to the next server in the
#     upstream list, alternating evenly. Good fit for stateless REST APIs where
#     any instance can handle any request.
#   - proxy_set_header: passes the real client IP and protocol through to the
#     API so logs see the actual caller rather than the proxy's address.
#   - /nginx_status: NGINX's built-in stub_status module exposes raw connection
#     counts. The nginx-exporter sidecar reads this page and converts it into
#     Prometheus metrics (active connections, requests/sec, etc.).
# =============================================================================

events {
    worker_connections 1024;
}

http {
    upstream retro_games_api_backend {
        server retro-games-api-instance-one:8000;
        server retro-games-api-instance-two:8000;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://retro_games_api_backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # stub_status exposes raw NGINX stats. The nginx-exporter scrapes this
        # and translates it into Prometheus format at its own /metrics endpoint.
        location /nginx_status {
            stub_status on;
            allow all;
        }
    }
}
